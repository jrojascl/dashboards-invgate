<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDO - Dashboard ITSM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg:           #0f172a;
    --panel:        #1e293b;
    --panel-soft:   #1a2640;
    --panel-strong: #263348;
    --text:         #f1f5f9;
    --muted:        #64748b;
    --border:       #334155;
    --blue:         #60a5fa;
    --teal:         #2dd4bf;
    --green:        #4ade80;
    --amber:        #fbbf24;
    --red:          #f87171;
    --purple:       #a78bfa;
    --coral:        #fb923c;
    --shadow:       0 4px 32px rgba(0,0,0,.55);
  }

  * { box-sizing: border-box; }
  html { background: var(--bg); }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', Arial, sans-serif;
    font-size: 18px;
  }

  button, select, input { font: inherit; }
  button { cursor: pointer; }

  .shell {
    width: 100%;
    max-width: 1920px;
    margin: 0 auto;
    padding: 28px 36px 44px;
  }

  .topbar {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: end;
    margin-bottom: 22px;
  }

  .brand {
    color: var(--blue);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: .85;
  }

  h1 {
    margin: 0;
    color: var(--text);
    font-size: 38px;
    line-height: 1.05;
    font-weight: 700;
    letter-spacing: -.01em;
  }

  .meta {
    display: grid;
    gap: 6px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    text-align: right;
  }

  .toolbar {
    display: flex;
    flex-direction: column;
    gap: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }

  .toolbar-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }

  .periods { display: flex; flex-wrap: wrap; gap: 8px; }

  .period-btn, .tool-btn, .clear-btn {
    border: 1px solid var(--border);
    background: var(--panel-soft);
    color: var(--muted);
    border-radius: 8px;
    padding: 10px 16px;
    font-weight: 700;
    font-size: 15px;
    transition: background .15s, border-color .15s, color .15s;
  }

  .period-btn.active {
    background: var(--blue);
    border-color: var(--blue);
    color: #0f172a;
  }

  .tool-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
  .tool-btn:hover, .clear-btn:hover { border-color: var(--blue); color: var(--text); }
  .period-btn:hover:not(.active) { border-color: var(--blue); color: var(--text); }
  .tool-btn.primary { background: var(--blue); color: #0f172a; border-color: var(--blue); font-weight: 700; }
  .tool-btn.primary:hover { background: #93c5fd; }

  .select-wrap { display: flex; align-items: center; gap: 10px; }
  label { color: var(--muted); font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: .1em; }

  select, .email-input {
    border: 1px solid var(--border);
    background: var(--panel-soft);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 14px;
    font-weight: 600;
    font-size: 15px;
    outline: none;
    transition: border-color .15s;
  }
  select { min-width: 280px; max-width: 480px; }
  .email-input { min-width: 240px; max-width: 340px; }
  select:focus, .email-input:focus { border-color: var(--blue); }

  .active-filter {
    display: none;
    align-items: center;
    gap: 10px;
    margin: 0 0 18px;
    color: var(--teal);
    font-weight: 700;
    font-size: 15px;
  }
  .active-filter.visible { display: flex; }

  .dashboard { display: grid; gap: 18px; }

  .kpis {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 14px;
  }

  .kpi, .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
  }

  .kpi {
    padding: 22px 22px 18px;
    min-height: 152px;
    position: relative;
    overflow: hidden;
  }

  /* Accent bar izquierda en cada KPI */
  .kpi::before {
    content: '';
    position: absolute;
    left: 0; top: 16px; bottom: 16px;
    width: 3px;
    border-radius: 0 3px 3px 0;
    background: var(--muted);
    opacity: .5;
  }
  .kpi.blue::before   { background: var(--blue);   opacity: 1; }
  .kpi.green::before  { background: var(--green);  opacity: 1; }
  .kpi.amber::before  { background: var(--amber);  opacity: 1; }
  .kpi.red::before    { background: var(--red);    opacity: 1; }
  .kpi.teal::before   { background: var(--teal);   opacity: 1; }
  .kpi.purple::before { background: var(--purple); opacity: 1; }

  .kpi-label {
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .kpi-value {
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 56px;
    line-height: 1;
    font-weight: 500;
    overflow-wrap: anywhere;
  }
  .kpi-sub { margin-top: 10px; color: var(--muted); font-size: 14px; font-weight: 600; }
  .kpi.blue .kpi-value   { color: var(--blue);   }
  .kpi.green .kpi-value  { color: var(--green);  }
  .kpi.amber .kpi-value  { color: var(--amber);  }
  .kpi.red .kpi-value    { color: var(--red);    }
  .kpi.teal .kpi-value   { color: var(--teal);   }
  .kpi.purple .kpi-value { color: var(--purple); }

  .grid {
    display: grid;
    grid-template-columns: repeat(12, minmax(0, 1fr));
    gap: 18px;
  }

  .panel { padding: 22px; min-height: 300px; position: relative; }
  .span-3  { grid-column: span 3; }
  .span-4  { grid-column: span 4; }
  .span-5  { grid-column: span 5; }
  .span-6  { grid-column: span 6; }
  .span-7  { grid-column: span 7; }
  .span-8  { grid-column: span 8; }
  .span-12 { grid-column: span 12; }

  .panel-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }
  .panel-title {
    margin: 0;
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -.01em;
  }
  .panel-note { color: var(--muted); font-size: 13px; font-weight: 700; }

  .chart-wrap         { width: 100%; height: 340px; }
  .chart-wrap.short   { height: 300px; }
  .chart-wrap.tall    { height: 460px; }

  /* Tabla de agentes */
  .agent-table { width: 100%; border-collapse: collapse; font-size: 16px; }
  .agent-table tr { border-bottom: 1px solid var(--border); }
  .agent-table tr:last-child { border-bottom: none; }
  .agent-table td { padding: 11px 0; vertical-align: middle; }
  .agent-table td:last-child { text-align: right; font-family: 'DM Mono', monospace; font-size: 15px; color: var(--muted); }
  .bar-bg   { margin-top: 7px; height: 6px; background: var(--panel-strong); border-radius: 999px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--blue); border-radius: 999px; transition: width .5s ease; }

  /* Estado de carga / error */
  .state {
    min-height: 420px;
    display: grid;
    place-items: center;
    color: var(--muted);
    text-align: center;
    font-weight: 700;
  }
  .state-inner { display: grid; gap: 14px; justify-items: center; }
  .state code {
    max-width: 760px;
    background: var(--panel-strong);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--red);
    padding: 12px 16px;
    white-space: normal;
  }
  .spinner {
    width: 34px;
    height: 34px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 999px;
    animation: spin .85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .exporting .toolbar, .exporting .active-filter, .exporting .tool-actions { box-shadow: none; }

  /* Branding */
  .brand-header { display: flex; align-items: center; gap: 20px; }
  .brand-logo { height: 40px; width: auto; display: block; filter: brightness(1.1); }

  /* Rango custom */
  .date-range-row {
    display: none;
    align-items: center;
    gap: 10px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .date-range-row.visible { display: flex; }
  .date-input {
    border: 1px solid var(--border);
    background: var(--panel-soft);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font: inherit;
    font-weight: 600;
    font-size: 15px;
  }

  /* Modo edición */
  .editable { outline: 2px dashed var(--blue); outline-offset: 3px; }
  .hide-panel-btn {
    position: absolute;
    top: 8px; right: 8px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--red);
    color: #fff;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
  }
  .tool-btn.active { background: var(--blue); border-color: var(--blue); color: #0f172a; }

  .edit-bar {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--panel-strong);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .edit-bar.visible { display: flex; }
  .edit-bar-info { color: var(--muted); font-size: 14px; font-weight: 700; flex-grow: 1; }
  .edit-fields {
    flex-basis: 100%;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .field-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 38px;
    color: var(--text);
    background: var(--panel-soft);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 10px;
    font-size: 14px;
    font-weight: 700;
    text-transform: none;
    letter-spacing: 0;
  }
  .field-toggle input { width: 16px; height: 16px; accent-color: var(--blue); }
  .view-name-input {
    border: 1px solid var(--border);
    background: var(--panel-soft);
    color: var(--text);
    border-radius: 7px;
    padding: 10px 12px;
    font: inherit;
    font-weight: 600;
    width: 200px;
    font-size: 15px;
  }

  @media (max-width: 1280px) {
    .kpis { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .span-3, .span-4, .span-5, .span-6, .span-7, .span-8 { grid-column: span 6; }
  }
  @media (max-width: 860px) {
    body { font-size: 16px; }
    .shell { padding: 18px; }
    .topbar { grid-template-columns: 1fr; }
    .toolbar-top { flex-direction: column; align-items: flex-start; }
    .meta { text-align: left; }
    .tool-actions { justify-content: flex-start; }
    select { min-width: 100%; }
    .select-wrap { align-items: stretch; flex-direction: column; }
    .kpis { grid-template-columns: 1fr; }
    .span-3, .span-4, .span-5, .span-6, .span-7, .span-8, .span-12 { grid-column: span 12; }
    .kpi-value { font-size: 44px; }
    h1 { font-size: 30px; }
  }
</style>
</head>
<body>
<div class="shell" id="capture-root">
  <header class="topbar">
    <div class="brand-header">
      <div>
        <div class="brand">BDO · Service Management · ITSM</div>
        <h1>Dashboard de tickets</h1>
      </div>
    </div>
    <div class="meta">
      <span id="meta-last-extraction">Ultima extraccion: -</span>
      <span id="meta-total">- tickets en DB</span>
      <span id="meta-generated">Vista generada: -</span>
    </div>
  </header>

  <section class="toolbar" aria-label="Filtros del dashboard">
    <div class="toolbar-top">
      <div class="periods" id="periods"></div>
      <div class="tool-actions">
        <div class="select-wrap">
          <label for="area-select">Area</label>
          <select id="area-select" onchange="setArea(this.value)">
            <option value="">Todas las areas</option>
          </select>
        </div>
        <div class="select-wrap">
          <label for="user-email">Usuario</label>
          <input type="email" id="user-email" class="email-input" placeholder="correo@empresa.com" onchange="setUserEmail(this.value)" onblur="setUserEmail(this.value)">
        </div>
        <div class="select-wrap" id="views-select-wrap" style="display:none">
          <label for="views-select">Vista</label>
          <select id="views-select" onchange="loadView(this.value)">
            <option value="">Vista por defecto</option>
          </select>
        </div>
        <button class="tool-btn" type="button" onclick="loadData()">Actualizar</button>
        <button class="tool-btn" id="edit-mode-btn" type="button" onclick="toggleEditMode()">Configurar vista</button>
        <button class="tool-btn primary" type="button" onclick="exportPdf()">Exportar PDF</button>
      </div>
    </div>
    <div class="date-range-row" id="date-range-row">
      <label for="date-from">Desde</label>
      <input type="date" id="date-from" class="date-input">
      <label for="date-to">Hasta</label>
      <input type="date" id="date-to" class="date-input">
      <button class="tool-btn" type="button" onclick="applyCustomRange()">Aplicar</button>
    </div>
  </section>

  <div class="active-filter" id="active-filter">
    <span id="active-filter-text"></span>
    <button class="clear-btn" type="button" onclick="setArea('')">Limpiar</button>
  </div>

  <div class="edit-bar" id="edit-bar">
    <span class="edit-bar-info">Modo edición · clic en × para ocultar paneles</span>
    <button class="tool-btn" type="button" onclick="showAllPanels()">Mostrar todos</button>
    <input type="text" class="view-name-input" id="view-name-input" placeholder="Nombre de la vista...">
    <button class="tool-btn" type="button" onclick="saveCurrentView()">Guardar vista</button>
    <button class="tool-btn" type="button" onclick="deleteCurrentView()">Borrar vista</button>
    <div class="edit-fields" id="edit-fields"></div>
  </div>

  <main id="root">
    <div class="state"><div class="state-inner"><div class="spinner"></div><span>Cargando datos...</span></div></div>
  </main>
</div>

<script>
// ── Constantes ──────────────────────────────────────────────────────────────
const PERIODS = [
  { id: 'daily',      label: 'Diario'        },
  { id: 'weekly',     label: 'Semanal'       },
  { id: 'monthly',    label: 'Mensual'       },
  { id: 'prev_month', label: 'Mes Anterior'  },
  { id: 'historical', label: 'Historico'     },
  { id: 'custom',     label: 'Rango'         },
];

const PANEL_DEFS = [
  { id: 'kpi-created',    label: 'Creados'          },
  { id: 'kpi-closed',     label: 'Cerrados'         },
  { id: 'kpi-solved',     label: 'Solucionados'     },
  { id: 'kpi-open',       label: 'Abiertos ahora'   },
  { id: 'kpi-sla',        label: 'SLA breach'       },
  { id: 'kpi-resolution', label: 'Resolucion prom.' },
  { id: 'panel-trend',    label: 'Tendencia'        },
  { id: 'panel-sla',      label: 'SLA'              },
  { id: 'panel-area',     label: 'Tickets por area' },
  { id: 'panel-status',   label: 'Tickets por estado' },
  { id: 'panel-priority', label: 'Prioridad'        },
  { id: 'panel-type',     label: 'Tipo'             },
  { id: 'panel-resolution', label: 'Resolucion'     },
  { id: 'panel-categories', label: 'Top categorias' },
  { id: 'panel-agents',   label: 'Carga por agente' },
];

// Paleta para dark mode
const C = {
  blue:   '#60a5fa',
  teal:   '#2dd4bf',
  green:  '#4ade80',
  amber:  '#fbbf24',
  red:    '#f87171',
  purple: '#a78bfa',
  coral:  '#fb923c',
  sky:    '#38bdf8',
  slate:  '#94a3b8',
};
const SERIES_COLORS = [C.blue, C.teal, C.amber, C.purple, C.coral, C.green, C.red, C.sky, C.slate];

// ECharts tooltip / axis estilo compartido
const TT = {
  backgroundColor: '#0f172a',
  borderColor:     '#334155',
  borderWidth:     1,
  padding:         [10, 14],
  textStyle:       { color: '#f1f5f9', fontSize: 15, fontWeight: '600' },
  extraCssText:    'box-shadow:0 8px 32px rgba(0,0,0,.6);border-radius:8px;',
};
const AXIS_LABEL = { color: '#64748b', fontSize: 14, fontWeight: 'bold' };
const SPLIT_LINE = { lineStyle: { color: '#1e293b' } };

function grad(dir, c1, c2) {
  const coords = dir === 'h' ? [0,0,1,0] : [0,0,0,1];
  return new echarts.graphic.LinearGradient(...coords,
    [{ offset: 0, color: c1 }, { offset: 1, color: c2 }]
  );
}

// ── Estado global ────────────────────────────────────────────────────────────
const state = {
  period: 'daily', areaId: '', areaName: '', areas: [],
  lastData: null, exporting: false, dateFrom: '', dateTo: '',
  hiddenPanels: new Set(), savedViews: [], activeView: null,
  editMode: false, userEmail: '',
};
let chartInstances = {};

// ── Formateo ─────────────────────────────────────────────────────────────────
function fmt(v)  { return Number(v || 0).toLocaleString('es-CL'); }
function pct(v)  { return v === null || v === undefined ? '-' : `${v > 0 ? '+' : ''}${v}%`; }
function esc(v)  { return String(v ?? '').replace(/[&<>'"]/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;' }[ch])); }
function validEmail(v) { return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(String(v||'').trim()); }

function periodLabel() {
  if (state.period === 'custom' && state.dateFrom && state.dateTo)
    return `${state.dateFrom} – ${state.dateTo}`;
  return PERIODS.find(p => p.id === state.period)?.label || 'Historico';
}

function comparisonText(key) {
  const c = state.lastData?.comparison;
  if (!c || c[key] === null || c[key] === undefined) return 'sin comparativo';
  return `${pct(c[key])} vs periodo anterior`;
}

// ── ECharts helpers ──────────────────────────────────────────────────────────
function destroyCharts() {
  Object.values(chartInstances).forEach(c => { if (c && !c.isDisposed()) c.dispose(); });
  chartInstances = {};
}

function makeChart(id, option) {
  const el = document.getElementById(id);
  if (!el) return null;
  const chart = echarts.init(el, null, { renderer: 'canvas' });
  chart.setOption(option);
  chartInstances[id] = chart;
  return chart;
}

window.addEventListener('resize', () => {
  Object.values(chartInstances).forEach(c => { if (c && !c.isDisposed()) c.resize(); });
});

// ── Botones de período ───────────────────────────────────────────────────────
function renderPeriodButtons() {
  document.getElementById('periods').innerHTML = PERIODS.map(p => `
    <button type="button" class="period-btn ${p.id === state.period ? 'active' : ''}" onclick="setPeriod('${p.id}')">
      ${p.label}
    </button>
  `).join('');
}

function setPeriod(period) {
  state.period = period;
  renderPeriodButtons();
  const row = document.getElementById('date-range-row');
  if (row) row.classList.toggle('visible', period === 'custom');
  if (period === 'custom') {
    const today = new Date().toISOString().slice(0, 10);
    const fromEl = document.getElementById('date-from');
    const toEl   = document.getElementById('date-to');
    if (fromEl && !fromEl.value) fromEl.value = today.slice(0, 7) + '-01';
    if (toEl   && !toEl.value)   toEl.value   = today;
  } else {
    loadData();
  }
}

// ── Filtro de área ───────────────────────────────────────────────────────────
function setArea(areaId) {
  state.areaId = areaId || '';
  const area = state.areas.find(a => a.id === state.areaId);
  state.areaName = area?.name || '';
  const sel = document.getElementById('area-select');
  if (sel) sel.value = state.areaId;
  loadData();
}

function updateAreaSelect(areas) {
  state.areas = areas || [];
  const sel = document.getElementById('area-select');
  const cur = state.areaId;
  sel.innerHTML = '<option value="">Todas las areas</option>' +
    state.areas.map(a => `<option value="${esc(a.id)}">${esc(a.name)}</option>`).join('');
  sel.value = cur;
}

function updateActiveFilter() {
  const box  = document.getElementById('active-filter');
  const text = document.getElementById('active-filter-text');
  if (state.areaId && state.areaName) {
    text.textContent = `Filtro activo: ${state.areaName}`;
    box.classList.add('visible');
  } else {
    box.classList.remove('visible');
  }
}

// ── Plantillas de componentes ─────────────────────────────────────────────────
function kpi(id, label, value, sub, tone) {
  if (state.hiddenPanels.has(id)) return '';
  const btn = state.editMode ? `<button class="hide-panel-btn" onclick="hidePanel('${id}')" title="Ocultar">×</button>` : '';
  return `
    <div class="kpi ${tone||''} ${state.editMode ? 'editable' : ''}" data-panel="${id}">
      ${btn}
      <div class="kpi-label">${esc(label)}</div>
      <div class="kpi-value">${esc(value)}</div>
      <div class="kpi-sub">${esc(sub)}</div>
    </div>`;
}

function panel(id, title, note, span, body) {
  if (state.hiddenPanels.has(id)) return '';
  const btn = state.editMode ? `<button class="hide-panel-btn" onclick="hidePanel('${id}')" title="Ocultar">×</button>` : '';
  return `
    <section class="panel ${span} ${state.editMode ? 'editable' : ''}" data-panel="${id}">
      <div class="panel-head">
        <h2 class="panel-title">${esc(title)}</h2>
        <span class="panel-note">${esc(note||'')}</span>
        ${btn}
      </div>
      ${body}
    </section>`;
}

// ── Render principal ─────────────────────────────────────────────────────────
function renderDashboard(data) {
  destroyCharts();
  state.lastData = data;
  updateAreaSelect(data.available_areas || []);
  updateActiveFilter();

  const m    = data.metrics  || {};
  const s    = data.summary  || {};
  const last = data.last_extraction ? new Date(data.last_extraction).toLocaleString('es-CL') : '-';
  const gen  = data.generated_at    ? new Date(data.generated_at).toLocaleString('es-CL')    : '-';

  document.getElementById('meta-last-extraction').textContent = `Ultima extraccion: ${last}`;
  document.getElementById('meta-total').textContent           = `${fmt(data.total_tickets_in_db)} tickets en DB`;
  document.getElementById('meta-generated').textContent       = `Vista generada: ${gen}`;

  const slaTotal = Number(s.sla_ok||0) + Number(s.sla_breach||0);
  const slaPct   = slaTotal ? Math.round(Number(s.sla_ok||0) / slaTotal * 100) : 0;
  const period   = periodLabel().toLowerCase();

  document.getElementById('root').innerHTML = `
    <section class="dashboard" id="dashboard">
      <div class="kpis">
        ${kpi('kpi-created',    `Creados ${period}`,      fmt(s.created_in_period),    comparisonText('created_delta_pct'),    'blue'  )}
        ${kpi('kpi-closed',     `Cerrados ${period}`,     fmt(s.closed_in_period),     comparisonText('closed_delta_pct'),     'green' )}
        ${kpi('kpi-solved',     `Solucionados ${period}`, fmt(s.solved_in_period),     comparisonText('solved_delta_pct'),     'teal'  )}
        ${kpi('kpi-open',       'Abiertos ahora',         fmt(s.open_now),             state.areaName || 'Todas las areas',   'amber' )}
        ${kpi('kpi-sla',        'SLA breach',             fmt(s.sla_breach),           comparisonText('sla_breach_delta_pct'), 'red'  )}
        ${kpi('kpi-resolution', 'Resolucion prom.',       `${fmt(s.avg_resolution_hours)}h`, comparisonText('avg_resolution_delta_pct'), 'purple')}
      </div>

      <div class="grid">
        ${panel('panel-trend',      'Tendencia',         periodLabel(),        'span-8', '<div class="chart-wrap" id="c-trend"></div>')}
        ${panel('panel-sla',        'SLA',               `${slaPct}% cumplido`, 'span-4', '<div class="chart-wrap" id="c-sla"></div>')}
        ${panel('panel-area',       'Tickets por area',  'Click para filtrar', 'span-6', '<div class="chart-wrap tall" id="c-area"></div>')}
        ${panel('panel-status',     'Tickets por estado','',                   'span-6', '<div class="chart-wrap tall" id="c-status"></div>')}
        ${panel('panel-priority',   'Prioridad',         '',                   'span-4', '<div class="chart-wrap short" id="c-priority"></div>')}
        ${panel('panel-type',       'Tipo',              '',                   'span-4', '<div class="chart-wrap short" id="c-type"></div>')}
        ${panel('panel-resolution', 'Resolucion',        '',                   'span-4', '<div class="chart-wrap short" id="c-resolution"></div>')}
        ${panel('panel-categories', 'Top categorias',    '',                   'span-7', '<div class="chart-wrap tall" id="c-category"></div>')}
        ${panel('panel-agents',     'Carga por agente',  '',                   'span-5', '<div id="agent-table-wrap"></div>')}
      </div>
    </section>`;

  renderCharts(m, s);
  renderAgents(m.by_agent || {});
  renderEditPanelList();
}

// ── Gráficos ECharts ─────────────────────────────────────────────────────────
function renderCharts(m, s) {
  // Tendencia ─────────────────────────────────────────────────────────────────
  const tKeys = Object.keys(m.trend || m.monthly_trend || {});
  const tVals = Object.values(m.trend || m.monthly_trend || {});
  makeChart('c-trend', {
    backgroundColor: 'transparent',
    grid: { left: 10, right: 20, top: 10, bottom: 10, containLabel: true },
    xAxis: {
      type: 'category', data: tKeys, boundaryGap: false,
      axisLine: { lineStyle: { color: '#334155' } },
      axisTick: { show: false },
      axisLabel: { ...AXIS_LABEL, margin: 14 },
    },
    yAxis: {
      type: 'value', splitLine: SPLIT_LINE,
      axisLabel: AXIS_LABEL,
    },
    series: [{
      type: 'line', data: tVals, smooth: 0.38,
      symbol: 'circle', symbolSize: 9,
      lineStyle: { color: C.blue, width: 3 },
      itemStyle: { color: C.blue, borderColor: '#1e293b', borderWidth: 2 },
      areaStyle: { color: grad('v', 'rgba(96,165,250,.35)', 'rgba(96,165,250,.03)') },
      emphasis: { scale: 1.5 },
    }],
    tooltip: { ...TT, trigger: 'axis', formatter: arr => `${arr[0].name}: <strong>${fmt(arr[0].value)}</strong>` },
  });

  // SLA donut ─────────────────────────────────────────────────────────────────
  const slaTotal = Number(s.sla_ok||0) + Number(s.sla_breach||0);
  const slaPct   = slaTotal ? Math.round(Number(s.sla_ok||0) / slaTotal * 100) : 0;
  makeChart('c-sla', {
    backgroundColor: 'transparent',
    legend: { bottom: 4, textStyle: { color: '#94a3b8', fontSize: 14, fontWeight: '700' }, itemGap: 16 },
    series: [{
      type: 'pie', radius: ['48%', '72%'], center: ['50%', '44%'],
      data: [
        { value: m.sla?.ok      || 0, name: 'Cumplido', itemStyle: { color: C.green  } },
        { value: m.sla?.breach  || 0, name: 'Breach',   itemStyle: { color: C.red    } },
        { value: m.sla?.unknown || 0, name: 'Sin SLA',  itemStyle: { color: '#475569'} },
      ],
      label: { show: false },
      labelLine: { show: false },
      emphasis: { itemStyle: { shadowBlur: 16, shadowColor: 'rgba(0,0,0,.4)' } },
      itemStyle: { borderColor: '#1e293b', borderWidth: 3, borderRadius: 6 },
    }],
    graphic: [{
      type: 'text', left: 'center', top: '36%',
      style: { text: `${slaPct}%`, fill: '#f1f5f9', fontSize: 28, fontWeight: '700', fontFamily: 'DM Mono,monospace', textAlign: 'center' },
    }, {
      type: 'text', left: 'center', top: '50%',
      style: { text: 'cumplido', fill: '#64748b', fontSize: 13, fontWeight: '700', fontFamily: 'DM Sans,Arial,sans-serif', textAlign: 'center' },
    }],
    tooltip: { ...TT, formatter: p => `${p.name}: <strong>${fmt(p.value)}</strong> (${p.percent?.toFixed(1)}%)` },
  });

  // Areas (horizontal bar, clickable) ────────────────────────────────────────
  const aKeys = Object.keys(m.by_area || {});
  const aVals = Object.values(m.by_area || {});
  const aChart = makeChart('c-area', hBar(aKeys, aVals, grad('h', '#0f766e', '#2dd4bf'), 'Tickets'));
  if (aChart) {
    aChart.on('click', params => {
      const area = state.areas.find(a => a.name === params.name);
      if (area) setArea(area.id);
    });
  }

  // Status (horizontal bar) ───────────────────────────────────────────────────
  makeChart('c-status', hBar(
    Object.keys(m.by_status  || {}),
    Object.values(m.by_status || {}),
    grad('h', '#1d4ed8', '#60a5fa'), 'Tickets'
  ));

  // Prioridad (pie) ───────────────────────────────────────────────────────────
  makeChart('c-priority', pieChart(m.by_priority || {},
    [C.green, C.blue, C.amber, C.red, C.purple]));

  // Tipo (pie) ────────────────────────────────────────────────────────────────
  makeChart('c-type', pieChart(m.by_type || {},
    [C.blue, C.teal, C.amber, C.purple, C.coral]));

  // Resolución (vertical bar) ─────────────────────────────────────────────────
  const rKeys = Object.keys(m.resolution_buckets || {});
  const rVals = Object.values(m.resolution_buckets || {});
  makeChart('c-resolution', {
    backgroundColor: 'transparent',
    grid: { left: 10, right: 10, top: 10, bottom: 10, containLabel: true },
    xAxis: {
      type: 'category', data: rKeys,
      axisLine: { lineStyle: { color: '#334155' } }, axisTick: { show: false },
      axisLabel: { ...AXIS_LABEL, fontSize: 13 },
    },
    yAxis: { type: 'value', splitLine: SPLIT_LINE, axisLabel: AXIS_LABEL },
    series: [{
      type: 'bar', data: rVals,
      itemStyle: { color: grad('v', C.purple, '#4c1d95'), borderRadius: [6,6,0,0] },
      label: { show: true, position: 'top', color: '#94a3b8', fontSize: 13, fontWeight: '700', formatter: p => fmt(p.value) },
      emphasis: { itemStyle: { color: grad('v', '#c4b5fd', C.purple) } },
    }],
    tooltip: { ...TT, formatter: p => `${p.name}: <strong>${fmt(p.value)}</strong>` },
  });

  // Categorias (horizontal bar) ───────────────────────────────────────────────
  makeChart('c-category', hBar(
    Object.keys(m.by_category  || {}),
    Object.values(m.by_category || {}),
    grad('h', '#9a3412', C.coral), 'Tickets'
  ));
}

// Barra horizontal compartida
function hBar(labels, values, color, seriesName) {
  const rev_l = [...labels].reverse();
  const rev_v = [...values].reverse();
  const max   = Math.max(...rev_v, 1);
  return {
    backgroundColor: 'transparent',
    grid: { left: 10, right: 64, top: 8, bottom: 8, containLabel: true },
    xAxis: { type: 'value', splitLine: SPLIT_LINE, axisLabel: AXIS_LABEL, max },
    yAxis: {
      type: 'category', data: rev_l,
      axisLine: { show: false }, axisTick: { show: false },
      axisLabel: { ...AXIS_LABEL, fontSize: 14, width: 180, overflow: 'truncate' },
    },
    series: [{
      type: 'bar', name: seriesName, data: rev_v,
      itemStyle: { color, borderRadius: [0, 6, 6, 0] },
      label: { show: true, position: 'right', color: '#64748b', fontSize: 13, fontWeight: '700', formatter: p => fmt(p.value) },
      emphasis: { itemStyle: { shadowBlur: 12, shadowColor: 'rgba(0,0,0,.4)' } },
      barMaxWidth: 28,
    }],
    tooltip: { ...TT, trigger: 'axis', axisPointer: { type: 'none' },
      formatter: arr => `${arr[0].name}: <strong>${fmt(arr[0].value)}</strong>` },
  };
}

// Pie/donut compartido
function pieChart(obj, colors) {
  const data = Object.entries(obj).map(([name, value], i) => ({
    name, value, itemStyle: { color: colors[i % colors.length] },
  }));
  return {
    backgroundColor: 'transparent',
    legend: { bottom: 4, textStyle: { color: '#94a3b8', fontSize: 13, fontWeight: '700' }, itemGap: 12 },
    series: [{
      type: 'pie', radius: ['44%', '68%'], center: ['50%', '42%'],
      data,
      label: { show: false },
      labelLine: { show: false },
      itemStyle: { borderColor: '#1e293b', borderWidth: 3, borderRadius: 5 },
      emphasis: { itemStyle: { shadowBlur: 16, shadowColor: 'rgba(0,0,0,.4)' } },
    }],
    tooltip: { ...TT, formatter: p => `${p.name}: <strong>${fmt(p.value)}</strong> (${p.percent?.toFixed(1)}%)` },
  };
}

// ── Tabla de agentes ─────────────────────────────────────────────────────────
function renderAgents(byAgent) {
  const entries = Object.entries(byAgent || {});
  const max  = entries[0]?.[1] || 1;
  const wrap = document.getElementById('agent-table-wrap');
  if (!wrap) return;
  if (!entries.length) {
    wrap.innerHTML = '<div class="state"><div class="state-inner"><span>Sin datos para este filtro</span></div></div>';
    return;
  }
  wrap.innerHTML = `<table class="agent-table">${entries.map(([name, count]) => `
    <tr>
      <td>
        <strong>${esc(name)}</strong>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.max(4, Math.round(count / max * 100))}%"></div></div>
      </td>
      <td>${fmt(count)}</td>
    </tr>`).join('')}</table>`;
}

// ── Vistas guardadas ─────────────────────────────────────────────────────────
const VIEWS_KEY     = 'invgate_saved_views';
const USER_EMAIL_KEY = 'invgate_user_email';

function localViewsKey() { return state.userEmail ? `${VIEWS_KEY}:${state.userEmail}` : VIEWS_KEY; }

function normalizeView(raw) {
  return { name: raw.name, hiddenPanels: raw.hiddenPanels || raw.config?.hiddenPanels || [] };
}

async function initViews() {
  state.userEmail = (localStorage.getItem(USER_EMAIL_KEY) || '').trim().toLowerCase();
  const emailEl = document.getElementById('user-email');
  if (emailEl) emailEl.value = state.userEmail;
  await loadViewsForUser();
  renderViewsSelect();
}

async function loadViewsForUser() {
  if (state.userEmail && validEmail(state.userEmail)) {
    try {
      const res = await fetch(`/api/users/${encodeURIComponent(state.userEmail)}/views`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const payload = await res.json();
      state.savedViews = (payload.views || []).map(normalizeView);
      return;
    } catch (e) { console.warn('Vistas remotas no disponibles', e); }
  }
  try { state.savedViews = JSON.parse(localStorage.getItem(localViewsKey()) || '[]').map(normalizeView); }
  catch { state.savedViews = []; }
}

function renderViewsSelect() {
  const wrap = document.getElementById('views-select-wrap');
  const sel  = document.getElementById('views-select');
  if (!wrap || !sel) return;
  wrap.style.display = state.savedViews.length > 0 ? 'flex' : 'none';
  sel.innerHTML = '<option value="">Vista por defecto</option>' +
    state.savedViews.map(v => `<option value="${esc(v.name)}">${esc(v.name)}</option>`).join('');
  sel.value = state.activeView || '';
}

function loadView(name) {
  state.activeView  = name || null;
  const view = state.savedViews.find(v => v.name === name);
  state.hiddenPanels = new Set(view ? view.hiddenPanels : []);
  if (state.lastData) renderDashboard(state.lastData);
}

async function setUserEmail(value) {
  const email = (value || '').trim().toLowerCase();
  if (email && !validEmail(email)) return;
  state.userEmail    = email;
  state.activeView   = null;
  state.hiddenPanels = new Set();
  localStorage.setItem(USER_EMAIL_KEY, email);
  await loadViewsForUser();
  renderViewsSelect();
  if (state.lastData) renderDashboard(state.lastData);
}

function currentViewConfig() { return { hiddenPanels: [...state.hiddenPanels] }; }

async function saveCurrentView() {
  const input = document.getElementById('view-name-input');
  const name  = (input?.value || '').trim();
  if (!name) return;
  const entry = { name, ...currentViewConfig() };
  if (state.userEmail && validEmail(state.userEmail)) {
    await fetch(`/api/users/${encodeURIComponent(state.userEmail)}/views`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, config: currentViewConfig() }),
    });
    await loadViewsForUser();
  } else {
    const idx = state.savedViews.findIndex(v => v.name === name);
    if (idx >= 0) state.savedViews[idx] = entry; else state.savedViews.push(entry);
    localStorage.setItem(localViewsKey(), JSON.stringify(state.savedViews));
  }
  state.activeView = name;
  if (input) input.value = '';
  renderViewsSelect();
  toggleEditMode();
}

async function deleteCurrentView() {
  if (!state.activeView) return;
  const name = state.activeView;
  if (state.userEmail && validEmail(state.userEmail)) {
    await fetch(`/api/users/${encodeURIComponent(state.userEmail)}/views/${encodeURIComponent(name)}`, { method: 'DELETE' });
    await loadViewsForUser();
  } else {
    state.savedViews = state.savedViews.filter(v => v.name !== name);
    localStorage.setItem(localViewsKey(), JSON.stringify(state.savedViews));
  }
  state.activeView   = null;
  state.hiddenPanels = new Set();
  renderViewsSelect();
  if (state.lastData) renderDashboard(state.lastData);
}

function showAllPanels() {
  state.hiddenPanels = new Set();
  if (state.lastData) renderDashboard(state.lastData);
}

function hidePanel(id) {
  state.hiddenPanels.add(id);
  if (state.lastData) renderDashboard(state.lastData);
}

function setPanelVisible(id, visible) {
  if (visible) state.hiddenPanels.delete(id); else state.hiddenPanels.add(id);
  if (state.lastData) renderDashboard(state.lastData);
}

function renderEditPanelList() {
  const wrap = document.getElementById('edit-fields');
  if (!wrap) return;
  wrap.innerHTML = PANEL_DEFS.map(item => `
    <label class="field-toggle">
      <input type="checkbox" ${state.hiddenPanels.has(item.id) ? '' : 'checked'} onchange="setPanelVisible('${item.id}', this.checked)">
      <span>${esc(item.label)}</span>
    </label>`).join('');
}

function toggleEditMode() {
  state.editMode = !state.editMode;
  const btn = document.getElementById('edit-mode-btn');
  const bar = document.getElementById('edit-bar');
  if (btn) { btn.textContent = state.editMode ? 'Salir de edición' : 'Configurar vista'; btn.classList.toggle('active', state.editMode); }
  if (bar) bar.classList.toggle('visible', state.editMode);
  if (state.editMode && state.activeView) {
    const input = document.getElementById('view-name-input');
    if (input) input.value = state.activeView;
  }
  if (state.lastData) renderDashboard(state.lastData);
  renderEditPanelList();
}

// ── Rango custom ─────────────────────────────────────────────────────────────
function applyCustomRange() {
  const from = document.getElementById('date-from')?.value;
  const to   = document.getElementById('date-to')?.value;
  if (!from || !to || from > to) return;
  state.dateFrom = from;
  state.dateTo   = to;
  loadData();
}

// ── Fetch de datos ───────────────────────────────────────────────────────────
function buildUrl() {
  const params = new URLSearchParams({ period: state.period });
  if (state.areaId) params.set('area_id', state.areaId);
  if (state.period === 'custom' && state.dateFrom && state.dateTo) {
    params.set('date_from', state.dateFrom);
    params.set('date_to',   state.dateTo);
  }
  return `/api/metrics?${params.toString()}`;
}

function loadData() {
  if (state.period === 'custom' && (!state.dateFrom || !state.dateTo)) {
    renderPeriodButtons(); return;
  }
  renderPeriodButtons();
  document.getElementById('root').innerHTML =
    '<div class="state"><div class="state-inner"><div class="spinner"></div><span>Actualizando...</span></div></div>';
  fetch(buildUrl())
    .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.error || `HTTP ${r.status}`); }))
    .then(renderDashboard)
    .catch(err => {
      document.getElementById('root').innerHTML = `
        <div class="state"><div class="state-inner">
          <span>No se pudo cargar el dashboard</span>
          <code>${esc(err.message)}</code>
        </div></div>`;
    });
}

// ── Export PDF ────────────────────────────────────────────────────────────────
async function exportPdf() {
  const dashboard = document.getElementById('capture-root');
  if (!dashboard || !state.lastData) return;
  state.exporting = true;
  document.body.classList.add('exporting');
  try {
    const canvas = await html2canvas(dashboard, { scale: 2, backgroundColor: '#0f172a', useCORS: true });
    const pdf = new window.jspdf.jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a4' });
    const pw = pdf.internal.pageSize.getWidth();
    const ph = pdf.internal.pageSize.getHeight();
    const ratio = pw / canvas.width;
    const sliceH = Math.floor(ph / ratio);
    let srcY = 0, page = 0;
    while (srcY < canvas.height) {
      const partH = Math.min(sliceH, canvas.height - srcY);
      const pc = document.createElement('canvas');
      pc.width = canvas.width; pc.height = partH;
      pc.getContext('2d').drawImage(canvas, 0, srcY, canvas.width, partH, 0, 0, canvas.width, partH);
      if (page > 0) pdf.addPage();
      pdf.addImage(pc.toDataURL('image/png'), 'PNG', 0, 0, pw, partH * ratio);
      srcY += partH; page++;
    }
    pdf.save(`bdo-itsm-dashboard-${state.period}.pdf`);
  } finally {
    document.body.classList.remove('exporting');
    state.exporting = false;
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
initViews();
renderPeriodButtons();
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
